[pytest]
addopts = -ra --strict-markers --html=reports/report.html --self-contained-html --junitxml=reports/junit.xml
testpaths = tests api_tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: critical smoke tests
    regression: regression test coverage
    login: authentication tests
    cart: cart workflow tests
    checkout: checkout workflow tests
    inventory: inventory and product catalog tests
    # ── API markers ──────────────────────────────────────────────────────────
    api: API-level integration tests
    auth: Authentication / login API tests
    products: Product catalogue API tests
    orders: Order management API tests
    users: User profile API tests
    schema: JSON Schema validation tests
    negative: Negative / error-path API tests
    performance: API response-time performance tests
