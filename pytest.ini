[pytest]
addopts = -ra --strict-markers --html=reports/report.html --self-contained-html --junitxml=reports/junit.xml
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: critical smoke tests
    regression: regression test coverage
    login: authentication tests
    cart: cart workflow tests
    checkout: checkout workflow tests
    inventory: inventory and product catalog tests
